workflows:
  build_skylist:
    name: Build SkyList Debug APK
    max_build_duration: 60
    environment:
      image: ubuntu-22.04
      node: false
      flutter: false
      java: openjdk17
    scripts:
      - name: Grant gradlew permission
        script: chmod +x ./gradlew
      - name: Build Debug APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk